name: infra-shelf

services:
  # ─── PostgreSQL ────────────────────────────────────────────
  postgres:
    image: postgres:17-alpine
    container_name: infra-postgres
    restart: unless-stopped
    labels:
      infra-shelf.observe: "true"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ${DATA_DIR:-./data}/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - infra

  # ─── Redis ─────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: infra-redis
    restart: unless-stopped
    labels:
      infra-shelf.observe: "true"
    command: sh -c "test -f /data/users.acl || echo 'user default on >${REDIS_PASSWORD} ~* &* +@all' > /data/users.acl; redis-server --aclfile /data/users.acl"
    environment:
      REDISCLI_AUTH: ${REDIS_PASSWORD}
    volumes:
      - ${DATA_DIR:-./data}/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - infra

  # ─── RabbitMQ ──────────────────────────────────────────────
  rabbitmq:
    # Management plugin habilitado pra que o receiver `rabbitmq` do OTel
    # collector consiga consultar a Management HTTP API em :15672.
    image: rabbitmq:3-management-alpine
    container_name: infra-rabbitmq
    restart: unless-stopped
    labels:
      infra-shelf.observe: "true"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    volumes:
      - ${DATA_DIR:-./data}/rabbitmq:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    networks:
      - infra

  # ─── AIStor Free (S3-compatible, ex-MinIO) ────────────────
  aistor:
    image: quay.io/minio/aistor/minio:latest
    container_name: infra-aistor
    restart: unless-stopped
    labels:
      infra-shelf.observe: "true"
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${AISTOR_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${AISTOR_ROOT_PASSWORD}
      MINIO_LICENSE: ${AISTOR_LICENSE:-}
      MINIO_SUBNET_API_KEY: ${AISTOR_SUBNET_API_KEY:-}
      # Expoe /minio/v2/metrics/{cluster,node,bucket} sem token pro
      # prometheus receiver do collector. Outras rotas seguem autenticadas.
      MINIO_PROMETHEUS_AUTH_TYPE: public
    volumes:
      - ${DATA_DIR:-./data}/aistor:/data
    ports:
      - "${AISTOR_API_PORT:-9000}:9000"
    healthcheck:
      test:
        - "CMD-SHELL"
        - "MC_HOST_local=http://$$MINIO_ROOT_USER:$$MINIO_ROOT_PASSWORD@localhost:9000 mc admin info local --json >/dev/null"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - infra

  # ─── MongoDB ───────────────────────────────────────────────
  mongodb:
    # Sem imagem alpine oficial — a imagem oficial e Debian-based e ja inclui
    # mongosh + mongodump/mongorestore (MongoDB Database Tools).
    #
    # Pin exato em 7.0.34 (nao 8.x): os patches recentes do 8.x adicionaram um
    # guard FATAL que recusa Linux kernel >= 6.19 (SERVER-121912, bug de
    # io_uring). O OrbStack/Docker local roda kernel 7.0.x, entao mongo:8.0/8.3
    # nao sobem. 7.0.34 (ultimo LTS-7) e anterior ao guard, roda em qualquer
    # kernel, e fica congelado pra evitar surpresa se um patch futuro do 7.0 o
    # backportar.
    image: mongo:7.0.34
    container_name: infra-mongodb
    restart: unless-stopped
    labels:
      infra-shelf.observe: "true"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
    volumes:
      - ${DATA_DIR:-./data}/mongodb:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - infra

  # ─── Web app ───────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: infra-shelf-app
    restart: unless-stopped
    labels:
      infra-shelf.observe: "true"
    environment:
      APP_ADDR: 0.0.0.0:8080
      APP_USERNAME: ${APP_USERNAME:-admin}
      APP_PASSWORD: ${APP_PASSWORD:-admin}
      APP_TIMEZONE: ${APP_TIMEZONE:-America/Sao_Paulo}
      INFRA_SHELF_ROOT: /workspace
      APP_DATABASE_PATH: /workspace/data/app/infra-shelf-app.db
      INFRA_SHELF_BACKUPS_DIR: /workspace/backups
      INFRA_SHELF_REGISTRY_PATH: /workspace/data/apps.json
      INFRA_SHELF_SECRET: ${INFRA_SHELF_SECRET:-}
      BACKUP_S3_BUCKET: ${BACKUP_S3_BUCKET:-}
      BACKUP_S3_REGION: ${BACKUP_S3_REGION:-us-east-1}
      BACKUP_S3_PREFIX: ${BACKUP_S3_PREFIX:-infra-shelf/backups}
      BACKUP_S3_ENDPOINT: ${BACKUP_S3_ENDPOINT:-}
      BACKUP_S3_FORCE_PATH_STYLE: ${BACKUP_S3_FORCE_PATH_STYLE:-false}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
    volumes:
      - ./:/workspace
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "${APP_PORT:-8080}:8080"
    depends_on:
      - postgres
      - redis
      - rabbitmq
      - aistor
      - mongodb
    networks:
      - infra

  # ─── Reconcile (one-shot) ──────────────────────────────────
  # Reaplica vhosts/users/perms registrados em data/apps.json contra os
  # containers. Resgata o estado quando um volume é perdido (server reset,
  # delete acidental). Roda em todo `docker compose up` depois que postgres
  # e rabbitmq estão healthy, executa o binário shelf da mesma imagem do app
  # e sai. Idempotente — sem-op se tudo já estiver consistente.
  reconcile:
    build:
      context: .
      dockerfile: Dockerfile
    image: infra-shelf-app
    container_name: infra-shelf-reconcile
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    restart: "no"
    entrypoint: ["/usr/local/bin/shelf"]
    command: ["reconcile"]
    environment:
      INFRA_SHELF_ROOT: /workspace
      INFRA_SHELF_REGISTRY_PATH: /workspace/data/apps.json
      INFRA_SHELF_SECRET: ${INFRA_SHELF_SECRET:-}
    volumes:
      - ./:/workspace
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - infra

# ─── Network ──────────────────────────────────────────────
networks:
  infra:
    name: ${INFRA_NETWORK_NAME:-infra-shelf}
    driver: bridge
