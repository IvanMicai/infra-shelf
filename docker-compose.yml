name: infra-shelf

services:
  # ─── PostgreSQL ────────────────────────────────────────────
  postgres:
    image: postgres:17-alpine
    container_name: infra-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ${DATA_DIR:-./data}/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - infra

  # ─── Redis ─────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: infra-redis
    restart: unless-stopped
    command: sh -c "test -f /data/users.acl || echo 'user default on >${REDIS_PASSWORD} ~* &* +@all' > /data/users.acl; redis-server --aclfile /data/users.acl"
    environment:
      REDISCLI_AUTH: ${REDIS_PASSWORD}
    volumes:
      - ${DATA_DIR:-./data}/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - infra

  # ─── RabbitMQ ──────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3-alpine
    container_name: infra-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    volumes:
      - ${DATA_DIR:-./data}/rabbitmq:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    networks:
      - infra

# ─── Network ──────────────────────────────────────────────
networks:
  infra:
    name: ${INFRA_NETWORK_NAME:-infra-shelf}
    driver: bridge
