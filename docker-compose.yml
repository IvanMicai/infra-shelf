name: infra-shelf

services:
  # ─── PostgreSQL ────────────────────────────────────────────
  postgres:
    image: postgres:17-alpine
    container_name: infra-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ${DATA_DIR:-./data}/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - infra

  # ─── Redis ─────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: infra-redis
    restart: unless-stopped
    command: sh -c "test -f /data/users.acl || echo 'user default on >${REDIS_PASSWORD} ~* &* +@all' > /data/users.acl; redis-server --aclfile /data/users.acl"
    environment:
      REDISCLI_AUTH: ${REDIS_PASSWORD}
    volumes:
      - ${DATA_DIR:-./data}/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - infra

  # ─── RabbitMQ ──────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3-alpine
    container_name: infra-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    volumes:
      - ${DATA_DIR:-./data}/rabbitmq:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    networks:
      - infra

  # ─── AIStor Free (S3-compatible, ex-MinIO) ────────────────
  aistor:
    image: quay.io/minio/aistor/minio:latest
    container_name: infra-aistor
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${AISTOR_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${AISTOR_ROOT_PASSWORD}
    volumes:
      - ${DATA_DIR:-./data}/aistor:/data
    ports:
      - "${AISTOR_API_PORT:-9000}:9000"
    healthcheck:
      test: ["CMD-SHELL", "mc ready local 2>/dev/null || curl -fsS http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - infra

  # ─── Web app ───────────────────────────────────────────────
  app:
    build:
      context: ./packages/app
      dockerfile: Dockerfile
    container_name: infra-shelf-app
    restart: unless-stopped
    environment:
      APP_ADDR: 0.0.0.0:8080
      APP_USERNAME: ${APP_USERNAME:-admin}
      APP_PASSWORD: ${APP_PASSWORD:-admin}
      APP_TIMEZONE: ${APP_TIMEZONE:-America/Sao_Paulo}
      INFRA_SHELF_ROOT: /workspace
      APP_DATABASE_PATH: /workspace/data/app/infra-shelf-app.db
      INFRA_SHELF_BACKUPS_DIR: /workspace/backups
      INFRA_SHELF_REGISTRY_PATH: /workspace/packages/cli/src/apps.json
      INFRA_SHELF_SECRET: ${INFRA_SHELF_SECRET:-}
      BACKUP_S3_BUCKET: ${BACKUP_S3_BUCKET:-}
      BACKUP_S3_REGION: ${BACKUP_S3_REGION:-us-east-1}
      BACKUP_S3_PREFIX: ${BACKUP_S3_PREFIX:-infra-shelf/backups}
      BACKUP_S3_ENDPOINT: ${BACKUP_S3_ENDPOINT:-}
      BACKUP_S3_FORCE_PATH_STYLE: ${BACKUP_S3_FORCE_PATH_STYLE:-false}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
    volumes:
      - ./:/workspace
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "${APP_PORT:-8080}:8080"
    depends_on:
      - postgres
      - redis
      - rabbitmq
      - aistor
    networks:
      - infra

# ─── Network ──────────────────────────────────────────────
networks:
  infra:
    name: ${INFRA_NETWORK_NAME:-infra-shelf}
    driver: bridge
