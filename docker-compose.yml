name: infra-shelf

services:
  # ─── PostgreSQL ────────────────────────────────────────────
  postgres:
    image: postgres:17-alpine
    container_name: infra-postgres
    restart: unless-stopped
    labels:
      infra-shelf.observe: "true"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ${DATA_DIR:-./data}/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - infra

  # ─── Redis ─────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: infra-redis
    restart: unless-stopped
    labels:
      infra-shelf.observe: "true"
    command: sh -c "test -f /data/users.acl || echo 'user default on >${REDIS_PASSWORD} ~* &* +@all' > /data/users.acl; redis-server --aclfile /data/users.acl"
    environment:
      REDISCLI_AUTH: ${REDIS_PASSWORD}
    volumes:
      - ${DATA_DIR:-./data}/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - infra

  # ─── RabbitMQ ──────────────────────────────────────────────
  rabbitmq:
    # Management plugin enabled so the OTel collector's `rabbitmq` receiver can
    # query the Management HTTP API on :15672.
    image: rabbitmq:3-management-alpine
    container_name: infra-rabbitmq
    restart: unless-stopped
    labels:
      infra-shelf.observe: "true"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    volumes:
      - ${DATA_DIR:-./data}/rabbitmq:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    networks:
      - infra

  # ─── MongoDB ───────────────────────────────────────────────
  mongodb:
    # No official alpine image — the official image is Debian-based and already
    # ships mongosh + mongodump/mongorestore (MongoDB Database Tools).
    #
    # Pinned exactly to 7.0.34 (not 8.x): recent 8.x patches added a FATAL guard
    # that refuses Linux kernel >= 6.19 (SERVER-121912, an io_uring bug). The
    # local OrbStack/Docker VM runs a 7.x kernel, so mongo:8.0/8.3 won't boot.
    # 7.0.34 (the last LTS-7 patch) predates the guard, runs on any kernel, and
    # is frozen here to avoid surprises if a future 7.0 patch backports it.
    image: mongo:7.0.34
    container_name: infra-mongodb
    restart: unless-stopped
    labels:
      infra-shelf.observe: "true"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
    volumes:
      - ${DATA_DIR:-./data}/mongodb:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - infra

  # ─── Web app ───────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: infra-shelf-app
    restart: unless-stopped
    labels:
      infra-shelf.observe: "true"
    environment:
      APP_ADDR: 0.0.0.0:8080
      APP_USERNAME: ${APP_USERNAME:-admin}
      APP_PASSWORD: ${APP_PASSWORD:-admin}
      APP_TIMEZONE: ${APP_TIMEZONE:-America/Sao_Paulo}
      INFRA_SHELF_ROOT: /workspace
      APP_DATABASE_PATH: /workspace/data/app/infra-shelf-app.db
      INFRA_SHELF_BACKUPS_DIR: /workspace/backups
      INFRA_SHELF_REGISTRY_PATH: /workspace/data/apps.json
      INFRA_SHELF_SECRET: ${INFRA_SHELF_SECRET:-}
      BACKUP_S3_BUCKET: ${BACKUP_S3_BUCKET:-}
      BACKUP_S3_REGION: ${BACKUP_S3_REGION:-us-east-1}
      BACKUP_S3_PREFIX: ${BACKUP_S3_PREFIX:-infra-shelf/backups}
      BACKUP_S3_ENDPOINT: ${BACKUP_S3_ENDPOINT:-}
      BACKUP_S3_FORCE_PATH_STYLE: ${BACKUP_S3_FORCE_PATH_STYLE:-false}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
    volumes:
      - ./:/workspace
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "${APP_PORT:-8080}:8080"
    depends_on:
      - postgres
      - redis
      - rabbitmq
      - mongodb
    networks:
      - infra

  # ─── Reconcile (one-shot) ──────────────────────────────────
  # Reapplies the vhosts/users/perms recorded in data/apps.json against the
  # containers. Recovers state when a volume is lost (server reset, accidental
  # delete). Runs on every `docker compose up` once postgres and rabbitmq are
  # healthy, executes the shelf binary from the same image as the app, then
  # exits. Idempotent — a no-op when everything is already consistent.
  reconcile:
    build:
      context: .
      dockerfile: Dockerfile
    image: infra-shelf-app
    container_name: infra-shelf-reconcile
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    restart: "no"
    entrypoint: ["/usr/local/bin/shelf"]
    command: ["reconcile"]
    environment:
      INFRA_SHELF_ROOT: /workspace
      INFRA_SHELF_REGISTRY_PATH: /workspace/data/apps.json
      INFRA_SHELF_SECRET: ${INFRA_SHELF_SECRET:-}
    volumes:
      - ./:/workspace
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - infra

# ─── Network ──────────────────────────────────────────────
networks:
  infra:
    name: ${INFRA_NETWORK_NAME:-infra-shelf}
    driver: bridge
