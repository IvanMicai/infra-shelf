name: PR Title

# Squash-merge titles become the release commit, so PR titles must follow
# Conventional Commits (see CONTRIBUTING.md → Commit Messages).
on:
  pull_request_target:
    types: [opened, edited, synchronize, reopened]

permissions:
  pull-requests: read

jobs:
  lint:
    name: Conventional Commits
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Allowed types — matches the release rules documented in CONTRIBUTING.md.
          types: |
            feat
            fix
            perf
            docs
            test
            refactor
            chore
            ci
            build
            style
            revert
          requireScope: false
          subjectPattern: ^(?![A-Z]).+$
          subjectPatternError: |
            The subject "{subject}" should start with a lowercase letter.
