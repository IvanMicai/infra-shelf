name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: vet · test · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.x'
          check-latest: true
          cache: true

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test ./...

      - name: Build binaries
        env:
          CGO_ENABLED: '0'
        run: |
          go build -trimpath -o shelf ./cmd/shelf
          go build -trimpath -o shelf-web ./cmd/shelf-web

      - name: Smoke-check binaries
        run: |
          ./shelf --help
          test -x ./shelf-web
