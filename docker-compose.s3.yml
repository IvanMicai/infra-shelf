name: infra-shelf

# Opt-in S3-compatible object storage — not started by `make up`.
# Bring it up with `make s3-up` (or `make up-all`). Reuses the `infra` network
# from docker-compose.yml so apps + infra containers reach it by hostname.
#
# Defaults to the open-source MinIO image. To use a commercial AIStor build
# instead, set S3_IMAGE (and a license) in your .env:
#   S3_IMAGE=quay.io/minio/aistor/minio:latest
#   AISTOR_LICENSE=...        # or AISTOR_SUBNET_API_KEY=...

services:
  aistor:
    image: ${S3_IMAGE:-minio/minio}
    container_name: infra-aistor
    restart: unless-stopped
    labels:
      infra-shelf.observe: "true"
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${AISTOR_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${AISTOR_ROOT_PASSWORD}
      # Only consumed by the commercial AIStor image; ignored by open-source MinIO.
      MINIO_LICENSE: ${AISTOR_LICENSE:-}
      MINIO_SUBNET_API_KEY: ${AISTOR_SUBNET_API_KEY:-}
      # Expose /minio/v2/metrics/{cluster,node,bucket} without a token so the
      # SignOz collector's prometheus receiver can scrape it. Other routes stay
      # authenticated.
      MINIO_PROMETHEUS_AUTH_TYPE: public
    volumes:
      - ${DATA_DIR:-./data}/aistor:/data
    ports:
      - "${AISTOR_API_PORT:-9000}:9000"
    healthcheck:
      test:
        - "CMD-SHELL"
        - "MC_HOST_local=http://$$MINIO_ROOT_USER:$$MINIO_ROOT_PASSWORD@localhost:9000 mc admin info local --json >/dev/null"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - infra

networks:
  infra:
    name: ${INFRA_NETWORK_NAME:-infra-shelf}
    driver: bridge
